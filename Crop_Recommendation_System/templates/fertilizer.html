<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fertilizer Recommendation</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            🌾 Smart Farmer
        </div>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/crop">Crop Prediction</a></li>
            <li><a href="/fertilizer">Fertilizer Prediction</a></li>
        </ul>

    </nav>

    <!-- Form -->

    <div class="container">

        <div class="glass">

            <h1>

                <i class="fa-solid fa-flask"></i>

                Fertilizer Recommendation

            </h1>

            <p class="subtitle">

                Enter the crop, soil and environmental parameters to get the best fertilizer recommendation.

            </p>

            <form action="/predict_fertilizer" method="POST">

                <div class="grid">

                    <div class="input-group">
                        <label><i class="fa-solid fa-temperature-half"></i> Temperature (°C)</label>
                        <input type="number" step="0.01" name="Temperature" placeholder="Enter Temperature" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-droplet"></i> Moisture (%)</label>
                        <input type="number" step="0.01" name="Moisture" placeholder="Enter Moisture" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-cloud-rain"></i> Rainfall (mm)</label>
                        <input type="number" step="0.01" name="Rainfall" placeholder="Enter Rainfall" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-flask"></i> Soil pH</label>
                        <input type="number" step="0.01" name="PH" placeholder="Enter Soil pH" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-seedling"></i> Nitrogen (N)</label>
                        <input type="number" name="Nitrogen" placeholder="Enter Nitrogen" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-seedling"></i> Phosphorous (P)</label>
                        <input type="number" name="Phosphorous" placeholder="Enter Phosphorous" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-seedling"></i> Potassium (K)</label>
                        <input type="number" name="Potassium" placeholder="Enter Potassium" required>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-tree"></i> Organic Carbon (%)</label>
                        <input type="number" step="0.01" name="Carbon" placeholder="Enter Organic Carbon" required>
                    </div>

                    <div class="input-group">

                        <label>
                            <i class="fa-solid fa-mountain"></i>
                            Soil Type
                        </label>

                        <select name="Soil" required>

                            <option value="">Select Soil Type</option>

                            <option>Black</option>
                            <option>Clayey</option>
                            <option>Loamy</option>
                            <option>Red</option>
                            <option>Sandy</option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>
                            <i class="fa-solid fa-wheat-awn"></i>
                            Crop Type
                        </label>

                        <select name="Crop" required>

                            <option value="">Select Crop</option>

                            <option>Rice</option>
                            <option>Wheat</option>
                            <option>Maize</option>
                            <option>Sugarcane</option>
                            <option>Cotton</option>
                            <option>Tobacco</option>
                            <option>Pulses</option>
                            <option>Barley</option>
                            <option>Millets</option>
                            <option>Oil Seeds</option>

                        </select>

                    </div>

                </div>

                <button type="submit" class="predict-btn">

                    <i class="fa-solid fa-flask"></i>

                    Recommend Fertilizer

                </button>

            </form>

            <br>

            <a href="/">

                <button class="home-btn">

                    <i class="fa-solid fa-house"></i>

                    Back to Home

                </button>

            </a>

        </div>

    </div>

</body>

</html>
